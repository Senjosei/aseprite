environment:
  matrix:
#     - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2017
#       VCVARS_FILE: C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\VC\Auxiliary\Build\vcvars32.bat
#       VCVARS_ARG:
#       ENABLE_UI: ON
    - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2017
      VCVARS_FILE: C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\VC\Auxiliary\Build\vcvars64.bat
      VCVARS_ARG:
      ENABLE_UI: ON

install:
  - mkdir skia
  - cd skia
  - appveyor DownloadFile https://github.com/aseprite/skia/releases/download/m81-b607b32047/Skia-Windows-Release-x64.zip skia.zip
  - 7z x skia.zip
  - del /F /Q skia.zip
  - cd ..
  - call "%VCVARS_FILE%" %VCVARS_ARG%

before_build:
  - git submodule update --init --recursive
  
after_build:
  - cd ..
  - cd build
  - cd bin
  - del /F /Q *.pdb
  - del /F /Q *.ilk
  - del /F /Q *tests.exe
  - dir
  
artifacts:
  - path: build\bin
    name: release
    type: zip

build_script:
  - mkdir build
  - cd build
  - cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLAF_BACKEND=skia -DSKIA_DIR=C:\projects\aseprite\skia -DSKIA_LIBRARY_DIR=C:\projects\aseprite\skia\out\Release-x64 -G Ninja ..
  - ninja aseprite
